<div class="app-layout">
  <header class="app-header">
    <div class="header-container">
      <a class="brand" routerLink="/about">
        <i class="pi pi-file-edit"></i>
        <span>{{ title() }}</span>
      </a>

      <nav class="nav-links">
        @for (link of primaryLinks; track link.href) {
          <a [routerLink]="link.href" routerLinkActive="active">
            {{ link.label }}
          </a>
        }
      </nav>
    </div>
  </header>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>

  <footer class="app-footer">
    <div class="footer-container">
      <div class="footer-brand">
        <span class="footer-title">{{ title() }}</span>
        <p>{{ footerTagline() }}</p>
      </div>

      <nav class="footer-links" aria-label="Footer navigation">
        @for (link of footerLinks; track link.href) {
          <a [routerLink]="link.href">{{ link.label }}</a>
        }
      </nav>

      <p class="footer-copy">© {{ currentYear }} {{ title() }}. Built for focused note-taking.</p>
    </div>
  </footer>
</div>
